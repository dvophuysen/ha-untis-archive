name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag/version (e.g. v0.2.2). If empty, read from manifest.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="v$(jq -r .version custom_components/untis_archive/manifest.json)"
          fi
          echo "tag=${V}" >> "$GITHUB_OUTPUT"
          echo "Releasing as ${V}"

      - name: Create and push tag (if missing)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          T="${{ steps.ver.outputs.tag }}"
          if git rev-parse "$T" >/dev/null 2>&1; then
            echo "Tag $T already exists locally."
          elif gh api "repos/${{ github.repository }}/git/ref/tags/$T" >/dev/null 2>&1; then
            echo "Tag $T already exists on remote."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$T" -m "Release $T"
            git push origin "$T"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          T="${{ steps.ver.outputs.tag }}"
          if gh release view "$T" >/dev/null 2>&1; then
            echo "Release $T already exists."
          else
            gh release create "$T" \
              --title "$T" \
              --target main \
              --generate-notes
          fi
