name: Schul-Cockpit
version: "0.21.0"
slug: schul_cockpit
description: Mobile Schul-App für Kinder und Eltern, basierend auf dem UNTIS-Archive-Datenbestand.
url: https://github.com/dvophuysen/ha-untis-archive/tree/main/schul_cockpit
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
init: false
startup: services
boot: auto
ingress: true
ingress_port: 8099
ingress_stream: false
panel_icon: mdi:school
panel_title: Schul-Cockpit
# Default is admin-only; flip to false so kids and the non-admin parent
# also see the entry in the HA sidebar.
panel_admin: false
hassio_api: true
homeassistant_api: true
auth_api: true
# Direct port: lets the kids open the app on its own URL (http://<ha>:8099/)
# so iOS can install it as a real PWA (full-screen, offline). Protected by
# per-child PIN login. Inside HA the app still works via Ingress (no PIN).
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Direkter App-Zugriff (PIN-Login) für die Installation auf dem Home-Bildschirm
map:
  - config:ro
options:
  log_level: info
  external_url: ""
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  # Public URL the app is reachable at from outside HA (e.g. your Cloudflare
  # hostname for port 8099). When set, the notify-summary endpoint returns
  # full clickable deep links — perfect for WhatsApp/Telegram automations.
  external_url: str?
