# Schul-Cockpit – Dashboard für zwei Kinder gegen das UNTIS-Archive.
#
# Drei Hauptseiten, ein gemeinsamer Kind-Umschalter:
#   1. Übersicht       – Monatskalender mit Stundenplan, Fehltagen und
#                        Klassenarbeiten. Klick auf einen Termin öffnet
#                        die Untis-typische Detailansicht (Lehrstoff,
#                        Lehrer/Originallehrer, Raum, Vertretungs-Info).
#   2. Fächer          – Pro Fach eine chronologische Lehrstoff-Historie
#                        mit Vertretungs-Markierung.
#   3. Krankheits-Ausfälle – Pro Krankheits-Periode der verpasste Stoff,
#                        gruppiert nach Fach.
#
# Voraussetzungen (siehe docs/dashboard.md):
#   • HACS-Karten: atomic-calendar-revive, mushroom.
#   • Helper input_select.schul_cockpit_kind mit Optionen „Josia" / „Noah".
#   • Helper input_select.schul_cockpit_fach (Optionen werden per
#     Automation aus dem Fach-Verlauf-Sensor des aktuellen Kindes
#     dynamisch gefüllt).
#
# Entity-IDs gehen davon aus, dass die Untis-Config-Entries die Titel
# „Josia" und „Noah" tragen (Device-Slugs `untis_archive_josia` /
# `untis_archive_noah`). Bei anderen Anzeigenamen entsprechend ersetzen.

title: Schul-Cockpit
views:
  # ────────────────────────────────────────────────────────────────────
  # 1. ÜBERSICHT – Monatskalender mit allem drin
  # ────────────────────────────────────────────────────────────────────
  - title: Übersicht
    path: uebersicht
    icon: mdi:calendar-month
    cards:
      # ── Zentraler Kind-Umschalter (in jeder View identisch) ───────────
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Josia
            secondary: >-
              {% if is_state('input_select.schul_cockpit_kind', 'Josia') %}● aktiv{% else %}wechseln{% endif %}
            icon: mdi:account-school
            icon_color: >-
              {% if is_state('input_select.schul_cockpit_kind', 'Josia') %}blue{% else %}disabled{% endif %}
            fill_container: true
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.schul_cockpit_kind
                option: Josia
          - type: custom:mushroom-template-card
            primary: Noah
            secondary: >-
              {% if is_state('input_select.schul_cockpit_kind', 'Noah') %}● aktiv{% else %}wechseln{% endif %}
            icon: mdi:account-school
            icon_color: >-
              {% if is_state('input_select.schul_cockpit_kind', 'Noah') %}blue{% else %}disabled{% endif %}
            fill_container: true
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.schul_cockpit_kind
                option: Noah

      # Stundenplan + Fehltage + Klassenarbeiten in einem Monatskalender.
      # atomic-calendar-revive akzeptiert mehrere Calendar-Entities und
      # rendert ihre Events farblich getrennt.
      - type: conditional
        conditions:
          - condition: state
            entity: input_select.schul_cockpit_kind
            state: Josia
        card:
          type: custom:atomic-calendar-revive
          name: Stundenplan – Josia
          enableModeChange: true
          defaultMode: Calendar
          showMonth: true
          showWeekNumber: true
          firstDayOfWeek: 1
          showLocation: true
          showDescription: true
          showFullDayProgress: true
          showCurrentEventLine: true
          dimFinishedEvents: true
          finishedEventOpacity: 0.5
          entities:
            - entity: calendar.untis_archive_josia_stundenplan
              color: "#1976d2"
            - entity: calendar.untis_archive_josia_ereignisse
              color: "#e53935"

      - type: conditional
        conditions:
          - condition: state
            entity: input_select.schul_cockpit_kind
            state: Noah
        card:
          type: custom:atomic-calendar-revive
          name: Stundenplan – Noah
          enableModeChange: true
          defaultMode: Calendar
          showMonth: true
          showWeekNumber: true
          firstDayOfWeek: 1
          showLocation: true
          showDescription: true
          showFullDayProgress: true
          showCurrentEventLine: true
          dimFinishedEvents: true
          finishedEventOpacity: 0.5
          entities:
            - entity: calendar.untis_archive_noah_stundenplan
              color: "#1976d2"
            - entity: calendar.untis_archive_noah_ereignisse
              color: "#e53935"

      - type: markdown
        content: |
          **Legende** &nbsp;·&nbsp; ❌ Ausfall &nbsp;·&nbsp; ↺ Vertretung &nbsp;·&nbsp;
          🤒 versäumt (Krankheit) &nbsp;·&nbsp; 📝 Klassenarbeit
          (rote Markierung) &nbsp;·&nbsp; ganztägige rote Balken = Fehltage.
          Termin anklicken → Detailansicht mit Lehrstoff, Lehrer und Raum.

  # ────────────────────────────────────────────────────────────────────
  # 2. FÄCHER – Stoff-Historie pro Fach
  # ────────────────────────────────────────────────────────────────────
  - title: Fächer
    path: faecher
    icon: mdi:bookshelf
    cards:
      # ── Zentraler Kind-Umschalter (in jeder View identisch) ───────────
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Josia
            secondary: >-
              {% if is_state('input_select.schul_cockpit_kind', 'Josia') %}● aktiv{% else %}wechseln{% endif %}
            icon: mdi:account-school
            icon_color: >-
              {% if is_state('input_select.schul_cockpit_kind', 'Josia') %}blue{% else %}disabled{% endif %}
            fill_container: true
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.schul_cockpit_kind
                option: Josia
          - type: custom:mushroom-template-card
            primary: Noah
            secondary: >-
              {% if is_state('input_select.schul_cockpit_kind', 'Noah') %}● aktiv{% else %}wechseln{% endif %}
            icon: mdi:account-school
            icon_color: >-
              {% if is_state('input_select.schul_cockpit_kind', 'Noah') %}blue{% else %}disabled{% endif %}
            fill_container: true
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.schul_cockpit_kind
                option: Noah

      - type: custom:mushroom-template-card
        primary: "Fach wählen"
        secondary: "{{ states('input_select.schul_cockpit_fach') }}"
        icon: mdi:book-open-variant
        icon_color: indigo
        tap_action:
          action: more-info
          entity: input_select.schul_cockpit_fach

      - type: conditional
        conditions:
          - condition: state
            entity: input_select.schul_cockpit_kind
            state: Josia
        card:
          type: markdown
          content: |
            {% set fach = states('input_select.schul_cockpit_fach') %}
            {% set subjects = state_attr('sensor.untis_archive_josia_fach_verlauf', 'subjects') or {} %}
            {% set items = subjects.get(fach, []) %}
            {% if items | count == 0 %}
            _Wähle oben ein Fach._

            Verfügbar: {{ (state_attr('sensor.untis_archive_josia_fach_verlauf', 'subject_list') or []) | join(' · ') }}
            {% else %}
            ## {{ fach }} – Lehrstoff-Historie (Josia)
            _Letzter Stoff zuerst. ↺ Vertretung, ❌ Ausfall, 🤒 versäumt._

            {% for it in items -%}
            {% set hh = (it.start // 100) | string %}{% set mm = '%02d' % (it.start % 100) %}
            {% set marker =
              ('❌ Ausfall · ' if it.code == 'cancelled'
               else ('🤒 versäumt · ' if it.was_absent
               else ('↺ Vertretung · ' if it.code == 'irregular' else ''))) %}
            ### {{ it.date }} · {{ hh }}:{{ mm }}
            {{ marker }}{{ it.topic or '_(kein Lehrstoff erfasst)_' }}
            {%- if it.teacher %}
            _Lehrer: {{ it.teacher }}{% if it.room %} · Raum {{ it.room }}{% endif %}_
            {%- endif %}

            {% endfor %}{% endif %}

      - type: conditional
        conditions:
          - condition: state
            entity: input_select.schul_cockpit_kind
            state: Noah
        card:
          type: markdown
          content: |
            {% set fach = states('input_select.schul_cockpit_fach') %}
            {% set subjects = state_attr('sensor.untis_archive_noah_fach_verlauf', 'subjects') or {} %}
            {% set items = subjects.get(fach, []) %}
            {% if items | count == 0 %}
            _Wähle oben ein Fach._

            Verfügbar: {{ (state_attr('sensor.untis_archive_noah_fach_verlauf', 'subject_list') or []) | join(' · ') }}
            {% else %}
            ## {{ fach }} – Lehrstoff-Historie (Noah)
            _Letzter Stoff zuerst. ↺ Vertretung, ❌ Ausfall, 🤒 versäumt._

            {% for it in items -%}
            {% set hh = (it.start // 100) | string %}{% set mm = '%02d' % (it.start % 100) %}
            {% set marker =
              ('❌ Ausfall · ' if it.code == 'cancelled'
               else ('🤒 versäumt · ' if it.was_absent
               else ('↺ Vertretung · ' if it.code == 'irregular' else ''))) %}
            ### {{ it.date }} · {{ hh }}:{{ mm }}
            {{ marker }}{{ it.topic or '_(kein Lehrstoff erfasst)_' }}
            {%- if it.teacher %}
            _Lehrer: {{ it.teacher }}{% if it.room %} · Raum {{ it.room }}{% endif %}_
            {%- endif %}

            {% endfor %}{% endif %}

  # ────────────────────────────────────────────────────────────────────
  # 3. KRANKHEITS-AUSFÄLLE – pro Periode der verpasste Stoff
  # ────────────────────────────────────────────────────────────────────
  - title: Krankheits-Ausfälle
    path: krankheit
    icon: mdi:bed
    cards:
      # ── Zentraler Kind-Umschalter (in jeder View identisch) ───────────
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Josia
            secondary: >-
              {% if is_state('input_select.schul_cockpit_kind', 'Josia') %}● aktiv{% else %}wechseln{% endif %}
            icon: mdi:account-school
            icon_color: >-
              {% if is_state('input_select.schul_cockpit_kind', 'Josia') %}blue{% else %}disabled{% endif %}
            fill_container: true
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.schul_cockpit_kind
                option: Josia
          - type: custom:mushroom-template-card
            primary: Noah
            secondary: >-
              {% if is_state('input_select.schul_cockpit_kind', 'Noah') %}● aktiv{% else %}wechseln{% endif %}
            icon: mdi:account-school
            icon_color: >-
              {% if is_state('input_select.schul_cockpit_kind', 'Noah') %}blue{% else %}disabled{% endif %}
            fill_container: true
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.schul_cockpit_kind
                option: Noah

      - type: conditional
        conditions:
          - condition: state
            entity: input_select.schul_cockpit_kind
            state: Josia
        card:
          type: markdown
          content: |
            {% set periods = state_attr('sensor.untis_archive_josia_krankheitsperioden', 'periods') or [] %}
            {% if periods | count == 0 %}
            ## Keine Krankheits-Ausfälle im laufenden Schuljahr 🎉
            {% else %}
            ## Krankheits-Ausfälle – Josia
            _{{ periods | count }} Periode{% if periods | count != 1 %}n{% endif %} im Schuljahr. Pro Periode der versäumte Stoff, gruppiert nach Fach — das ist die Liste, die das Kind sich von den Klassenkameraden besorgen muss._

            {% for p in periods %}
            ---
            ### 🤒 {{ p.start_date }}{% if p.end_date and p.end_date != p.start_date %} – {{ p.end_date }}{% endif %}
            {% if p.is_excused %}✅ entschuldigt{% else %}⚠️ unentschuldigt{% endif %}{% if p.reason %} · {{ p.reason }}{% endif %} · **{{ p.lessons_count }} Stunden** versäumt

            {% if p.subjects | count == 0 %}
            _Keine Lehrstoff-Einträge für diese Periode (möglicherweise nichts dokumentiert oder Stunden nicht im Archiv-Fenster)._
            {% else %}
            {% for fach in p.subjects.keys() | sort %}
            **{{ fach }}**
            {% for it in p.subjects[fach] -%}
            {% set hh = (it.start // 100) | string %}{% set mm = '%02d' % (it.start % 100) %}
            - {{ it.date }} · {{ hh }}:{{ mm }} – {{ it.topic or '_(kein Lehrstoff erfasst – bei Klassenkameraden erfragen)_' }}{% if it.teacher %} _(· {{ it.teacher }})_{% endif %}
            {% endfor %}

            {% endfor %}
            {% endif %}
            {% endfor %}{% endif %}

      - type: conditional
        conditions:
          - condition: state
            entity: input_select.schul_cockpit_kind
            state: Noah
        card:
          type: markdown
          content: |
            {% set periods = state_attr('sensor.untis_archive_noah_krankheitsperioden', 'periods') or [] %}
            {% if periods | count == 0 %}
            ## Keine Krankheits-Ausfälle im laufenden Schuljahr 🎉
            {% else %}
            ## Krankheits-Ausfälle – Noah
            _{{ periods | count }} Periode{% if periods | count != 1 %}n{% endif %} im Schuljahr. Pro Periode der versäumte Stoff, gruppiert nach Fach — das ist die Liste, die das Kind sich von den Klassenkameraden besorgen muss._

            {% for p in periods %}
            ---
            ### 🤒 {{ p.start_date }}{% if p.end_date and p.end_date != p.start_date %} – {{ p.end_date }}{% endif %}
            {% if p.is_excused %}✅ entschuldigt{% else %}⚠️ unentschuldigt{% endif %}{% if p.reason %} · {{ p.reason }}{% endif %} · **{{ p.lessons_count }} Stunden** versäumt

            {% if p.subjects | count == 0 %}
            _Keine Lehrstoff-Einträge für diese Periode (möglicherweise nichts dokumentiert oder Stunden nicht im Archiv-Fenster)._
            {% else %}
            {% for fach in p.subjects.keys() | sort %}
            **{{ fach }}**
            {% for it in p.subjects[fach] -%}
            {% set hh = (it.start // 100) | string %}{% set mm = '%02d' % (it.start % 100) %}
            - {{ it.date }} · {{ hh }}:{{ mm }} – {{ it.topic or '_(kein Lehrstoff erfasst – bei Klassenkameraden erfragen)_' }}{% if it.teacher %} _(· {{ it.teacher }})_{% endif %}
            {% endfor %}

            {% endfor %}
            {% endif %}
            {% endfor %}{% endif %}
